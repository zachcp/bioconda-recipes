{% set name = "pyexcelerator" %}
{% set version = "0.6.4a" %}
{% set file_ext = "tar.bz2" %}
{% set hash_type = "sha256" %}
{% set hash_value = "2bd3480d328f4ded15763fdc2c6075fdacdfa2d9f65e8ba0019286e312b32ca3" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  fn: '{{ name }}-{{ version }}.{{ file_ext }}'
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ file_ext }}
  '{{ hash_type }}': '{{ hash_value }}'

build:
  number: 0
  script: 'python setup.py install '

requirements:
  host:
    - python
  run:
    - python

test:
  imports:
    - pyExcelerator

about:
  home: http://sourceforge.net/projects/pyexcelerator/
  license: BSD License
  license_family: BSD
  license_file: ''
  summary: generating Excel 97+ files; importing Excel 95+ files; Excel files dumper; OLE2 files dumper; xls2txt, xls2csv, xls2html
  description: "pyExcelerator  is a   library  for  generating  Excel  97/2000/XP/2003  and\nOpenOffice    Calc   compatible     spreadsheets.     pyExcelerator     has\nfull-blown   support   for  UNICODE\
    \  in Excel and Calc spreadsheets, allows\nusing variety of formatting features,   provides   interface   to  printing\noptions   of   Excel   and OpenOffice  Calc.  pyExcelerator  contains  also\n\
    Excel BIFF8 dumper and MS compound  documents  dumper.  Main  advantage  is\npossibility  of generating Excel  spreadsheets  without  COM  servers.  The\nonly requirement -- Python 2.4b2 or higher.\n\
    From version 0.5 pyExcelerator can import data from Excel spreadsheets."
  doc_url: ''
  dev_url: ''

extra:
  recipe-maintainers: ''
